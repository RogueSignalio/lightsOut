<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lights Out - Phaser.js</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/RogueSignalio/overBase@v0.1/css/over_demo.min.css" id="page_style">
<script src="https://cdn.jsdelivr.net/npm/phaser@v3.90.0/dist/phaser.min.js" crossorigin="anonymous"></script>
  <style>
    html { font-size: 16px; }
    body { margin: 10; flex-wrap: wrap; display: flex; justify-content: center; align-items: center; }
    canvas { border: 2px solid #444; }
    button { background: #222222; color: #FFCC00; font-size:14px; min-width: auto;
              border-radius: 10px; padding: 3px;margin:3px;border:3px solid #FFCC00; }
    input { background: #222222; color: #FFCC00; font-size: 20px; }
  </style>
</head>
<body>
  <div style="margin:5px;padding:5px;font-size:16px;width:90%;">
  Grid Size: <input id="grid_size" type="number" value="5" max="9" min="3" /> | 
  <button onclick="create()">Create</button>
  <br>
  Game Type:
  <button onclick="setType('lights_out')">Lights Out</button>
  <button onclick="setType('lights_on')">Lights On</button>
  <button onclick="setType('flip_out')">Flip Out</button>
  <button onclick="setType('flip_on')">Flip On</button>
  <button onclick="setType('flipped_out')">Flipped Out</button>
  <button onclick="setType('flipped_on')">Flipped On</button>
  <br>
  </div><br>
  <div id="game"></div>
  <div style="margin:5px;padding:5px;font-size:16px;width:90%;">
  <button onclick="cheat()">Cheat</button> |
  <button onclick="solve()">Solve</button><br>
  <div id="cheat" style="width:90%;overflow:auto;"></div>
  </div>
  <script src="lights_out.js"></script>
</body>
<script>

// Game configuration
let gg = null
let gtype = 'lights_out'
function create() {
  if (gg) {
    gg.destroy(true,false)   
  }
  document.getElementById("cheat").innerHTML = ""
  let grid_size = document.getElementById("grid_size").valueAsNumber
  let config = {
    type: Phaser.AUTO,
    width: 340,
    height: 380,
    backgroundColor: '#111',
    // scene: [LightsOutScene],
    parent: 'game',
    disableContextMenu: true,
    callbacks: {
      preBoot: (game) => {
          game.scene.add('LightsOutScene', LightsOutScene, true, { 
            grid_size: grid_size,
            type: gtype,
          });
      },
    },
  };
  gg = new Phaser.Game(config);   
}
// Start the game

function setType(type) {
  gtype = type
  create();
}

function cheat() {
  if (gg) {
    document.getElementById("cheat").innerHTML = 
    "<pre>column,row\n" + gg.scene.scenes[0].moves.join(" : ") + "\n</pre>"
  }
}

function solve() {
    gg.scene.scenes[0].solve(600)
}

window.addEventListener('load', function() {
  create();
})
</script>
</html>
